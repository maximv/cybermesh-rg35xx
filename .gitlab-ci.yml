stages:
  - test

variables:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

smoke_test:
  stage: test
  image: python:3.11-slim
  script:
    - python3 smoke_test.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

